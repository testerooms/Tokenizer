<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokenizer — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#141414;--text:#e8e8e8;--muted:#666;--accent:#f59e0b;--accent-dim:rgba(245,158,11,0.12);--line:#1f1f1f;--red:#dc2626;--green:#22c55e;--radius:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;padding:2rem}
.container{max-width:1200px;margin:0 auto}
h1{font-family:'Archivo Black',sans-serif;font-size:1.2rem;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:2rem}
h1 span{color:var(--accent)}
h2{font-family:'Archivo Black',sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:0.75rem}
h2::after{content:'';flex:1;height:1px;background:var(--line)}
.row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;margin-bottom:2rem;border:1px solid var(--line)}
.stat{background:var(--bg);padding:1.25rem 1.5rem}
.stat-num{font-family:'Archivo Black',sans-serif;font-size:1.8rem;line-height:1.2}
.stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:0.25rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-bottom:2rem;border:1px solid var(--line)}
.card{background:var(--bg);padding:1.5rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.4rem}
.form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--text);padding:0.65rem 0.8rem;font-family:'Sora',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:60px}
.btn{background:var(--accent);color:#0a0a0a;border:none;padding:0.7rem 1.5rem;font-family:'Archivo Black',sans-serif;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;transition:opacity 0.2s;width:100%}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.4;cursor:not-allowed}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{font-family:'Archivo Black',sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);text-align:left;padding:0.6rem 0.8rem;border-bottom:1px solid var(--line);font-weight:400}
td{padding:0.6rem 0.8rem;border-bottom:1px solid var(--line);color:var(--text)}
tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;padding:0.15rem 0.5rem;border:1px solid var(--line)}
.tag.admin{border-color:var(--accent);color:var(--accent)}
.tag.manager{border-color:var(--green);color:var(--green)}
.tag.engineer{border-color:var(--muted);color:var(--muted)}
.bar-wrap{display:flex;align-items:center;gap:0.5rem}
.bar{height:4px;background:var(--surface);flex:1;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}
.bar-fill.warn{background:var(--red)}
.status-ok{color:var(--green)}
.status-warn{color:var(--accent)}
.status-critical{color:var(--red)}
.ml-alloc{color:var(--accent);font-size:0.7rem}
.message{padding:0.8rem 1rem;margin:0.75rem 0;font-size:0.8rem;display:none}
.message.ok{display:block;background:var(--accent-dim);border:1px solid var(--accent)}
.message.err{display:block;background:rgba(220,38,38,0.1);border:1px solid var(--red);color:var(--red)}
.empty{color:var(--muted);font-size:0.8rem;padding:1rem 0}
@media(max-width:768px){.row{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>Token<span>izer</span> &nbsp; Admin</h1>

  <div class="row" id="stats"></div>

  <div class="grid2">
    <div class="card">
      <h2>Allocate Tokens</h2>
      <div id="form-message" class="message"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="engineer@company.com">
      </div>
      <div class="form-group">
        <label>Tokens</label>
        <input type="number" id="input-tokens" placeholder="500000" min="1">
      </div>
      <div class="form-group">
        <label>Budget (USD)</label>
        <input type="number" id="input-budget" placeholder="25.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Note</label>
        <textarea id="input-note" placeholder="Q3 research budget"></textarea>
      </div>
      <button class="btn" id="btn-allocate" onclick="allocate()">Allocate →</button>
    </div>
    <div class="card">
      <h2>Engineers</h2>
      <div id="engineers-list"></div>
    </div>
  </div>

  <h2>Allocation History</h2>
  <div id="allocs-list"><div class="empty">Loading...</div></div>
</div>

<script>
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { "Content-Type": "application/json" }, ...opts });
  return res.json();
}

function render() {
  loadStats();
  loadEngineers();
  loadAllocations();
}

async function loadStats() {
  const d = await api("/api/stats");
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-num">$${d.totalToday.toFixed(2)}</div><div class="stat-label">Spent Today</div></div>
    <div class="stat"><div class="stat-num">${d.activeEngineers}</div><div class="stat-label">Active Engineers</div></div>
    <div class="stat"><div class="stat-num">$${d.totalAllocated.toFixed(2)}</div><div class="stat-label">Allocated</div></div>
    <div class="stat"><div class="stat-num">${(d.totalTokensAllocated / 1000000).toFixed(1)}M</div><div class="stat-label">Tokens Allocated</div></div>
  `;
}

async function loadEngineers() {
  const engs = await api("/api/engineers");
  document.getElementById("engineers-list").innerHTML = engs.length === 0
    ? '<div class="empty">No engineers provisioned.</div>'
    : `<table>
      <tr><th>Name</th><th>Role</th><th>Daily</th><th>Today</th></tr>
      ${engs.map(e => {
        const pct = e.daily_budget_usd > 0 ? ((e.todaySpent / e.daily_budget_usd) * 100).toFixed(0) : 0;
        const cls = pct >= 90 ? "status-critical" : pct >= 75 ? "status-warn" : "status-ok";
        return `<tr>
          <td>${e.id}</td>
          <td><span class="tag ${e.role}">${e.role}</span></td>
          <td>$${e.daily_budget_usd.toFixed(2)}</td>
          <td><span class="bar-wrap"><span class="${cls}">$${e.todaySpent.toFixed(4)}</span><span class="bar"><span class="bar-fill${pct >= 90 ? ' warn' : ''}" style="width:${Math.min(pct, 100)}%"></span></span></span></td>
        </tr>`;
      }).join("")}
    </table>`;
}

async function loadAllocations() {
  const allocs = await api("/api/allocations");
  document.getElementById("allocs-list").innerHTML = allocs.length === 0
    ? '<div class="empty">No allocations yet.</div>'
    : `<table>
      <tr><th>Date</th><th>Engineer</th><th>Tokens</th><th>Budget</th><th>By</th><th>Note</th></tr>
      ${allocs.map(a => `<tr>
        <td>${(a.created_at || "").slice(0, 10)}</td>
        <td>${a.engineer_email}</td>
        <td>${a.tokens_allocated.toLocaleString()}</td>
        <td>$${a.budget_usd.toFixed(2)}</td>
        <td>${a.allocated_by}</td>
        <td class="ml-alloc">${a.note || ""}</td>
      </tr>`).join("")}
    </table>`;
}

async function allocate() {
  const btn = document.getElementById("btn-allocate");
  const msg = document.getElementById("form-message");
  btn.disabled = true;

  const data = {
    email: document.getElementById("input-email").value.trim(),
    tokens: parseInt(document.getElementById("input-tokens").value),
    budget: parseFloat(document.getElementById("input-budget").value) || 0,
    note: document.getElementById("input-note").value.trim(),
  };

  if (!data.email || !data.tokens) {
    msg.className = "message err"; msg.textContent = "Email and tokens required.";
    btn.disabled = false; return;
  }

  try {
    const res = await api("/api/allocate", { method: "POST", body: JSON.stringify(data) });
    if (res.ok) {
      msg.className = "message ok";
      msg.textContent = `✓ Allocated ${data.tokens.toLocaleString()} tokens to ${data.email}`;
      document.getElementById("input-email").value = "";
      document.getElementById("input-tokens").value = "";
      document.getElementById("input-budget").value = "";
      document.getElementById("input-note").value = "";
      loadStats(); loadEngineers(); loadAllocations();
    } else {
      msg.className = "message err"; msg.textContent = "Error: " + (res.error || "unknown");
    }
  } catch (e) {
    msg.className = "message err"; msg.textContent = "Error: " + e.message;
  }

  btn.disabled = false;
}

render();
setInterval(loadStats, 10000);
setInterval(loadEngineers, 10000);
</script>
</body>
</html>
